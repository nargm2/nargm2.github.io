    <section class="contact-section">
        <h1 class="title-back">Contact Me</h1>
        <p></p>

        <form>
            <div class="form-group">
                <label for="title-dropdown">Title*</label>
                <select id="title-dropdown" name="title-dropdown" required>
                    <option value="" disabled selected>Select your title</option>
                    <option value="mr">Mr.</option>
                    <option value="ms">Ms.</option>
                    <option value="mx">Mrs.</option>
                    <option value="dr">Dr.</option>
                </select>
            </div>

            <div class="form-group">
                <label for="full-name">Full Name*</label>
                <input type="text" id="full-name" name="full-name" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="email">Email Address*</label>
                <input type="email" id="email" name="email" placeholder="Enter your email address" required>
            </div>

            <div class="form-group">
                <label for="project-type">Inquiry Type*</label>
                <select id="project-type" name="project-type" required>
                    <option value="" disabled selected>Choose a category</option>
                    <option value="web">Digital Photography</option>
                    <option value="design">Web Design</option>
                    <option value="other">Position Opening</option>
                    <option value="other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label for="message">Message*</label>
                <textarea id="message" name="message" placeholder="Enter your message" required></textarea>
            </div>

            <button type="submit" class="submit-button">Submit</button>
        </form>
    </section>

<footer>
